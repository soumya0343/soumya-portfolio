<svg width="150" height="120" viewBox="0 0 150 120" xmlns="http://www.w3.org/2000/svg">
  <!-- Transparent background so it matches whatever background it's placed on -->
  <rect width="100%" height="100%" fill="transparent"/>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,500&amp;display=swap');
    
    .logo-text {
      font-family: "Cormorant Garamond", Georgia, serif;
      font-style: italic;
      font-size: 92px;
      fill: #c8a87c;
      font-weight: 500;
      letter-spacing: -6px;
    }
  </style>

  <text x="50%" y="72%" text-anchor="middle" class="logo-text">
    SG
  </text>
</svg>